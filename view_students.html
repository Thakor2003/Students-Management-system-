<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
<h2>Students</h2>
<table class="table table-bordered">
<tr><th>ID</th><th>Name</th><th>Email</th><th>Course</th><th>Action</th></tr>
{% for s in students %}
<tr>
<td>{{ s.id }}</td>
<td>{{ s.name }}</td>
<td>{{ s.email }}</td>
<td>{{ s.course }}</td>
<td>
<a class="btn btn-warning btn-sm" href="/edit/{{ s.id }}">Edit</a>
<a class="btn btn-danger btn-sm" href="/delete/{{ s.id }}">Delete</a>
</td>
</tr>
{% endfor %}
</table>
<a class="btn btn-secondary" href="/dashboard">Back</a>
</div>
